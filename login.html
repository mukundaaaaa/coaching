<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#faf8f4,#f3efe9);
}

.password-box{
position:relative;
margin-bottom:15px;
}

.password-box input{
padding-right:42px;
margin-bottom:0;
}

.toggle-eye{
position:absolute;
right:14px;
top:0;
bottom:0;
margin:auto;
height:20px;
display:flex;
align-items:center;
cursor:pointer;
opacity:0.7;
transition:opacity 0.2s ease;
}

.toggle-eye:hover{
opacity:1;
}

.container{
width:380px;
background:white;
padding:40px 35px;
border-radius:14px;
box-shadow:0 30px 80px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#777;
margin-bottom:30px;
}

.tabs{
display:flex;
margin-bottom:25px;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
font-weight:500;
color:#777;
}

.tab.active{
color:#E8651A;
border-bottom:2px solid #E8651A;
}

form{
display:none;
flex-direction:column;
}

form.active{
display:flex;
}

input{
width:100%;
padding:12px 14px;
border-radius:8px;
border:1px solid #e3e3e3;
font-size:14px;
margin-bottom:15px;
}

button{
padding:12px;
background:#E8651A;
border:none;
border-radius:6px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#d45715;
}

.message{
margin-top:10px;
font-size:13px;
text-align:center;
color:red;
}

.note{
font-size:12px;
color:#777;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">PRAJNANAM</div>
<div class="subtitle">Access Panel</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('login')">Login</div>
<div class="tab" onclick="switchTab('register')">Create Account</div>
</div>


<!-- LOGIN -->
<form id="loginForm" class="active">

<input type="text" id="username" placeholder="Username" required>

<div class="password-box">
  <input type="password" id="password" placeholder="Password" required>

  <svg id="eyeIcon" class="toggle-eye" onclick="togglePassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
    <circle cx="12" cy="12" r="3"></circle>
  </svg>

</div>

<button type="submit">Login</button>

<div class="message" id="loginMsg"></div>

</form>


<!-- CREATE ACCOUNT -->
<form id="registerForm">

<input type="text" placeholder="Name">

<input type="text" placeholder="Phone Number">

<div class="password-box">
  <input type="password" id="registerPassword" placeholder="Password">

  <svg id="eyeIconRegister" class="toggle-eye" onclick="toggleRegisterPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
    <circle cx="12" cy="12" r="3"></circle>
  </svg>

</div>

<button type="button">Create Account</button>

<div class="note">
Account creation will use OTP verification later.
</div>

</form>

</div>

<script>

function toggleRegisterPassword(){

const password=document.getElementById("registerPassword");
const icon=document.getElementById("eyeIconRegister");

if(password.type==="password"){
password.type="text";
icon.style.stroke="#E8651A";
}else{
password.type="password";
icon.style.stroke="#9aa0a6";
}

}

function togglePassword(){

const password=document.getElementById("password");
const icon=document.getElementById("eyeIcon");

if(password.type==="password"){
password.type="text";
icon.style.stroke="#E8651A";
}else{
password.type="password";
icon.style.stroke="#9aa0a6";
}

}

function switchTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll("form").forEach(f=>f.classList.remove("active"));

if(tab==="login"){
document.querySelectorAll(".tab")[0].classList.add("active");
document.getElementById("loginForm").classList.add("active");
}else{
document.querySelectorAll(".tab")[1].classList.add("active");
document.getElementById("registerForm").classList.add("active");
}

}

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

if(username==="mukunda" && password==="1234"){

window.location.href="admin-dashboard.html";

}else{

document.getElementById("loginMsg").innerText="Invalid username or password";

}

});

</script>

</body>
</html>
